<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">AQL Fisio mark</title>
  <desc id="desc">Compact AQL Fisio mark based on the selected wordmark style.</desc>
  <defs>
    <linearGradient id="markWord" x1="36" y1="68" x2="202" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#42f2df"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="54" fill="#263370"/>
  <g font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="128" y="116" font-size="62" font-weight="800" letter-spacing="-4" fill="url(#markWord)">AQL</text>
    <text x="128" y="166" font-size="36" font-weight="400" letter-spacing="8" fill="#ffffff">fisio</text>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M42 151H79" stroke="#20c4bd" stroke-width="5"/>
    <path d="M177 151H214" stroke="#20c4bd" stroke-width="5"/>
  </g>
